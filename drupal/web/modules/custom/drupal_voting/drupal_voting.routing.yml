entity.drupal_voting_question.settings:
  path: 'admin/structure/drupal-voting-question'
  defaults:
    _form: '\Drupal\drupal_voting\Form\QuestionSettingsForm'
    _title: 'Question'
  requirements:
    _permission: 'administer drupal_voting_question'
entity.drupal_voting_question.options:
  path: '/admin/content/questions/{drupal_voting_question}/options'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\QuestionOptionController::listing'
    _title: 'Manage Answer Options'
  requirements:
    _permission: 'administer drupal_voting_question'