entity.drupal_voting_question.settings:
  path: 'admin/structure/drupal-voting-question'
  defaults:
    _form: '\Drupal\drupal_voting\Form\QuestionSettingsForm'
    _title: 'Question'
  requirements:
    _permission: 'administer drupal_voting_question'
entity.drupal_voting_question.options:
  path: '/admin/content/questions/{question}/options'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\QuestionOptionController::listing'
    _title_callback: '\Drupal\drupal_voting\Controller\QuestionOptionController::title'
  requirements:
    _permission: 'administer drupal_voting_question'
  options:
    parameters:
      question:
        type: entity:drupal_voting_question
entity.drupal_voting_question_option.add_form:
  path: '/admin/content/questions/{drupal_voting_question}/options/add'
  defaults:
    _entity_form: 'drupal_voting_question_option.add'
    _title: 'Add Answer Option'
  requirements:
    _permission: 'administer drupal_voting_question'
  options:
    parameters:
      drupal_voting_question:
        type: entity:drupal_voting_question
drupal_voting.vote:
  path: '/question/{question}/vote'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\VotingController::vote'
    _title_callback: '\Drupal\drupal_voting\Controller\VotingController::voteTitle'
  requirements:
    _custom_access: '\Drupal\drupal_voting\Controller\VotingController::voteAccess'
  options:
    parameters:
      question:
        type: entity:drupal_voting_question
drupal_voting.results:
  path: '/question/{question}/results'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\VotingController::results'
    _title_callback: '\Drupal\drupal_voting\Controller\VotingController::resultsTitle'
  requirements:
    _custom_access: '\Drupal\drupal_voting\Controller\VotingController::resultsAccess'
  options:
    no_cache: TRUE
    parameters:
      question:
        type: entity:drupal_voting_question
drupal_voting.question_list:
  path: '/voting/questions'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\VotingController::list'
    _title: 'Questions'
  requirements:
    _permission: 'vote on questions'
    _custom_access: 'drupal_voting.voting_enabled_access::access'

# REST API Routes
drupal_voting.api.questions:
  path: '/api/v1/questions'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\ApiController::listQuestions'
  methods: [GET]
  requirements:
    _access: 'TRUE'

drupal_voting.api.question_detail:
  path: '/api/v1/questions/{identifier}'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\ApiController::getQuestion'
  methods: [GET]
  requirements:
    _access: 'TRUE'

drupal_voting.api.vote:
  path: '/api/v1/questions/{identifier}/vote'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\ApiController::vote'
  methods: [POST]
  requirements:
    _access: 'TRUE'

drupal_voting.api.results:
  path: '/api/v1/questions/{identifier}/results'
  defaults:
    _controller: '\Drupal\drupal_voting\Controller\ApiController::results'
  methods: [GET]
  requirements:
    _access: 'TRUE'
drupal_voting.settings:
  path: '/admin/config/system/drupal-voting'
  defaults:
    _form: '\Drupal\drupal_voting\Form\VotingSettingsForm'
    _title: 'Drupal Voting settings'
  requirements:
    _permission: 'administer drupal_voting_question'